name: Build and deploy TourPlanner to Azure Web App

on:
  push:
    branches:
      - master
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22.x'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Build static frontend
        working-directory: frontend
        run: npm run build

      - name: Copy frontend build into backend
        run: |
          rm -rf backend/static
          mkdir -p backend/static
          cp -R frontend/out/. backend/static/

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Validate backend dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt

      - name: Upload artifact for deployment
        uses: actions/upload-artifact@v4
        with:
          name: tourplanner-app
          path: |
            backend/
            !backend/.env
            !backend/venv/
            !backend/__pycache__/
            !backend/**/__pycache__/

  deploy:
    runs-on: ubuntu-latest
    needs: build
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Download artifact from build job
        uses: actions/download-artifact@v4
        with:
          name: tourplanner-app
          path: package

      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_90CCD6F5131847B68D06BB79536E3E8D }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_57EB26A5116B4549B510F7647CEA6EC0 }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_CFD1C1DBE60F4C3A87CAFA7912ED119C }}

      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v3
        id: deploy-to-webapp
        with:
          app-name: TourPlanner
          slot-name: Production
          package: package
          startup-command: gunicorn -w 2 -k uvicorn.workers.UvicornWorker main:app
